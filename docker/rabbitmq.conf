# Configuração do RabbitMQ com listener TLS (para validar amqps:// da lib).
# Mantém o listener TCP plain (5672) e adiciona o TLS (5671).

listeners.tcp.default = 5672
listeners.ssl.default = 5671

ssl_options.certfile = /etc/rabbitmq/certs/server.crt
ssl_options.keyfile  = /etc/rabbitmq/certs/server.key

# Dev: só autenticação de servidor (o cliente não apresenta certificado).
# O cliente de teste usa TlsVerifyPeer=False (aceita o cert self-signed).
ssl_options.verify = verify_none
ssl_options.fail_if_no_peer_cert = false
